name: Rust Tests

on:
  push:
    branches:
      - develop
    tags-ignore:
      - v*
  pull_request:

env:
  # incremental builds are slower and don't make much sense in ci
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: FULL
  RUSTFLAGS: "-C link-arg=-fuse-ld=lld"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - name: ultrahonk
            features: --features ark-ec/only-arithmetic-backend # ark-ec/only-arithmetic-backend panics if we attempt to do arithmetic outside of the G1ArithmeticBackend
          - name: nsv
            features: ""

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2025-06-12

      - name: Add rust-src component
        run: rustup component add rust-src --toolchain nightly-2025-06-12

      - uses: Swatinem/rust-cache@v2

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential gcc lld

      - name: Test ${{ matrix.package.name }}
        run: cargo test -p ${{ matrix.package.name }} --profile ci-dev ${{ matrix.package.features }}  