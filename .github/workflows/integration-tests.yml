name: Integration Tests
permissions:
  contents: read
on:
  push:
    branches:
      - develop
    tags-ignore:
      - v*
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
jobs:
  required:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2025-06-12

      - name: Add rust-src component
        run: rustup component add rust-src --toolchain nightly-2025-06-12

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown --toolchain nightly-2025-06-12

      - uses: Swatinem/rust-cache@v2

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential gcc lld
      
      - name: Install stylus
        run: cargo install cargo-stylus@0.6.3

      - name: Install nargo
        uses: supplypike/setup-bin@v4
        with:
          uri: 'https://github.com/noir-lang/noir/releases/download/v1.0.0-beta.6/nargo-x86_64-unknown-linux-gnu.tar.gz'
          name: 'nargo'
          version: '1.0.0-beta.6'

      - name: Install bb
        uses: supplypike/setup-bin@v4
        with:
          uri: 'https://github.com/AztecProtocol/aztec-packages/releases/download/v0.86.0/barretenberg-amd64-linux.tar.gz'
          name: 'bb'
          version: '0.86.0'

      - name: Install just
        run: cargo install just

      - name: Run integration tests
        run: just test-integration