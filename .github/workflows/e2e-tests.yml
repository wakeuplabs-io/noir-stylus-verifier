# This workflow runs our end-to-end tests suite.
#
# It roughly follows these steps:
# - Install rust
# - Install `cargo-stylus`
# - Spin up `nitro-testnode`
#
# Contract deployments and account funding happen on a per-test basis.
name: e2e
permissions:
  contents: read
on:
  push:
    branches:
      - develop
    tags-ignore:
      - v*
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
jobs:
  required:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential gcc lld
      
      - name: Install cargo-stylus
        run: cargo install cargo-stylus@0.6.0

      - name: Setup nitro node
        run: ./scripts/nitro-testnode.sh -d -i

      - name: run integration tests
        run: ./scripts/e2e-tests.sh