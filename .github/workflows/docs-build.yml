name: Build Docs Website

on:
  push:
    branches:
      - develop
    tags-ignore:
      - v*
  pull_request:

jobs:
  build:
    name: Build Docs Website
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        working-directory: docs
        run: pnpm install

      - name: Build docs site
        working-directory: docs
        run: pnpm build 
