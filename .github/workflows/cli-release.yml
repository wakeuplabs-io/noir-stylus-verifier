name: Cross-Platform Cli Rust Build and Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
      name: Build and Release CLI
      runs-on: ${{ matrix.os }}

      strategy:
        matrix:
          include:
            - os: ubuntu-latest
              target: x86_64-unknown-linux-musl
              build_command: cargo zigbuild --release --target=x86_64-unknown-linux-musl -p nsv
            - os: macos-latest
              target: x86_64-apple-darwin
              build_command: cargo zigbuild --release --target=x86_64-apple-darwin -p nsv
  
      steps:
        - uses: actions/checkout@v4
          with:
            submodules: 'recursive'

        - name: Setup Rust toolchain
          uses: dtolnay/rust-toolchain@stable
          with:
            toolchain: nightly-2025-06-12

        - name: Install Build Target
          run: rustup target add ${{ matrix.target }} --toolchain nightly-2025-06-12

        - uses: Swatinem/rust-cache@v2

        - name: Install build tools (Linux only)
          if: runner.os == 'Linux'
          run: sudo apt-get update && sudo apt-get install -y build-essential gcc lld

        - name: Install build tools (macOS only)
          if: runner.os == 'macOS'
          run: brew install llvm

        - name: Install zig
          uses: goto-bus-stop/setup-zig@v2
          with:
            version: 0.13.0
        
        - name: Install cargo-zigbuild
          run: cargo install --locked cargo-zigbuild

        - name: Build CLI
          run: ${{ matrix.build_command }}

        - name: Set Version from Tag
          shell: bash
          run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
  
        - name: Package Binary
          shell: bash
          run: |
            binary_name="nsv"
            output_dir="${binary_name}-${{ env.VERSION }}-${{ matrix.target }}"

            mkdir "$output_dir"
            mv "target/${{ matrix.target }}/release/${binary_name}" "$output_dir/"

            tar -czf "${output_dir}.tar.gz" "$output_dir"
            echo "ASSET=${output_dir}.tar.gz" >> $GITHUB_ENV
  
        - name: Upload Release Asset
          uses: softprops/action-gh-release@v1
          with:
            files: ${{ env.ASSET }}
            tag_name: ${{ github.ref_name }}
            draft: false
            prerelease: false
 