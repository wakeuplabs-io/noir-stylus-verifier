# off until ultrahonk package is fully compatible with stylus
name: Stylus Check

on:
  push:
    branches:
      - develop
    tags-ignore:
      - v*
  pull_request:

env:
  # incremental builds are slower and don't make much sense in ci
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: FULL

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-06-12

      - name: Add rust-src component
        run: rustup component add rust-src --toolchain nightly-2025-06-12

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown --toolchain nightly-2025-06-12

      - uses: Swatinem/rust-cache@v2

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential gcc lld

      - name: Install cargo-stylus
        run: cargo install cargo-stylus@0.6.0

      - name: Install wasm-opt
        run: cargo install wasm-opt@0.116.1

      - uses: extractions/setup-just@v3
        with:
          just-version: 1.38.0 

      - name: Check Verifier contract
        run: just check-contract verifier

      - name: Check Sumcheck Verifier contract
        run: just check-contract sumcheck-verifier

      - name: Check Shplemini Verifier contract
        run: just check-contract shplemini-verifier
