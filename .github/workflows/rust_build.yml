name: Build Contracts

on:
  push:
    branches:
      - develop
    tags-ignore:
      - v*
  pull_request:

env:
  # incremental builds are slower and don't make much sense in ci
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: FULL

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-06-12

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential gcc lld

      - uses: extractions/setup-just@v3
        with:
          just-version: 1.38.0 

      - name: Build Sumcheck Verifier contract
        run: just build-contract sumcheck-verifier

      - name: Build Shplemini Verifier contract
        run: just build-contract shplemini-verifier

      - name: Build Verifier contract
        run: just build-contract verifier
