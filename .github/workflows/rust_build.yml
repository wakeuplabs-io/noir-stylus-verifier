name: Rust Build

on:
  push:
    branches:
      - develop
    tags-ignore:
      - v*
  pull_request:

env:
  # incremental builds are slower and don't make much sense in ci
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: FULL
  RUSTFLAGS: "-C link-arg=-fuse-ld=lld"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      
      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
      
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential gcc lld
      
      - name: Build ultrahonk 
        run: cargo build -p ultrahonk --profile ci-dev --all-features
      
      - name: Build contracts 
        run: cargo build -p contracts --target wasm32-unknown-unknown --profile ci-dev
