[package]
name = "contracts"
version = "0.1.11"
edition = "2021"
license = "MIT OR Apache-2.0"
homepage = "https://github.com/OffchainLabs/stylus-hello-world"
repository = "https://github.com/OffchainLabs/stylus-hello-world"
keywords = ["arbitrum", "ethereum", "stylus", "alloy"]
description = "Stylus noir verifier"

[dependencies]
alloy-primitives = { workspace = true, default-features = false }
alloy-sol-types = { workspace = true, default-features = false }
stylus-sdk = { workspace = true, default-features = false }
ultrahonk = { path = "../ultrahonk" }
ark-ff = { workspace = true, default-features = false }
ark-ec = { workspace = true, default-features = false }
ark-bn254 = { workspace = true, default-features = false }
ark-serialize = { workspace = true, default-features = false }
serde = { workspace = true, default-features = false, features = ["derive"] }
num-traits = { workspace = true, default-features = false }
serde_with = { workspace = true, default-features = false, features = ["alloc"] }
postcard = { workspace = true, default-features = false, features = ["alloc"] }

[dev-dependencies]
alloy.workspace = true
alloy-primitives.workspace = true
tokio = { version = "1.12.0", features = ["full"] }
e2e.workspace = true
stylus-sdk = { workspace = true, features = ["stylus-test"] }
rand.workspace = true

[features]
default = ["mini-alloc"]
export-abi = ["stylus-sdk/export-abi"]
debug = ["stylus-sdk/debug"]
mini-alloc = ["stylus-sdk/mini-alloc"]
verifier = []
e2e-backends = []

[[bin]]
name = "stylus-noir-verifier"
path = "src/main.rs"

[lib]
crate-type = ["lib", "cdylib"]

[profile.release]
codegen-units = 1
strip = true
lto = true
panic = "abort"

# If you need to reduce the binary size, it is advisable to try other
# optimization levels, such as "s" and "z"
opt-level = 3
