[workspace]
members = ["packages/ultrahonk"]
resolver = "2"

[workspace.package]
edition = "2021"
rust-version = "1.85"
authors = ["Wakeuplabs <hello@wakeuplabs.io>"]
homepage = "https://www.wakeuplabs.io"
repository = "https:://github.com/Wakeuplabs/noir-stylus-verifier"
license = "MIT OR Apache-2.0"
publish = false
readme = "./README.md"

[workspace.dependencies]
ark-bn254 = "^0.5.0"
ark-ec = { version = "^0.5.0", default-features = false }
ark-ff = "^0.5.0"
ark-grumpkin = "^0.5.0"
ark-poly = "^0.5.0"
ark-serialize = { version = "^0.5.0", features = ["derive", "std"] }
eyre = "0.6"
num-bigint = { version = "0.4.5" }
num-traits = { version = "0.2.18", default-features = false }
rand = "0.8.5"
rand_chacha = "0.3"
serde = { version = "1.0.193", features = ["derive", "rc"] }
sha3 = "0.10.8"
thiserror = "2"
tracing = { version = "0.1.40" }

# This profile can be used for CI in pull requests.
[profile.ci-dev]
opt-level = 1
inherits = "dev"
incremental = false
debug = true
overflow-checks = false
# [profile.ci-dev.build-override]
# opt-level = 3
